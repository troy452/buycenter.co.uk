<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BuyCenter | Curated Essentials</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
  <style>
    :root { --bg: #ffffff; --text: #000000; --accent: #f3f4f6; }
    body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; }
    
    /* Luxury Grid Styling */
    .product-card { position: relative; overflow: hidden; background: #fff; transition: opacity 0.3s; }
    .product-card img { filter: multiply(1.1); transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1); }
    .product-card:hover img { transform: scale(1.05); }
    
    /* "Save" Button Overlay */
    .save-btn { opacity: 0; position: absolute; top: 1rem; right: 1rem; transition: opacity 0.2s; z-index: 10; }
    .product-card:hover .save-btn { opacity: 1; }
    
    /* Infinite Scroll & Loader */
    #loader { border-top-color: #000; }
    .skeleton { background: #f3f4f6; }

    /* Custom Scrollbar for Boutique Feel */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: #fff; }
    ::-webkit-scrollbar-thumb { background: #000; }
  </style>
</head>
<body class="pt-24">

  <header class="fixed top-0 w-full bg-white/90 backdrop-blur-md z-50 border-b border-gray-100">
    <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
      <h1 class="text-xl font-bold tracking-tighter cursor-pointer" onclick="navigate('/')">BUYCENTER</h1>
      
      <div class="flex-1 max-w-sm mx-10 hidden md:block">
        <input type="text" id="search-input" placeholder="Search curated finds..." 
               class="w-full bg-gray-50 border-none rounded-full py-2 px-6 text-sm focus:ring-1 focus:ring-black outline-none">
      </div>

      <nav class="flex items-center space-x-8 text-xs font-bold uppercase tracking-widest">
        <span class="cursor-pointer hover:opacity-50" onclick="navigate('/?cat=minimalist')">New</span>
        <span class="cursor-pointer hover:opacity-50" onclick="navigate('/?cat=tech')">Tech</span>
        <span class="cursor-pointer hover:opacity-50" onclick="showWishlist()">Saved (<span id="wish-count">0</span>)</span>
      </nav>
    </div>
  </header>

  <main class="max-w-7xl mx-auto px-6">
    <div id="page-info" class="mb-12">
      <h2 id="main-title" class="text-4xl font-light tracking-tight">Curation 01</h2>
    </div>

    <div id="product-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-x-10 gap-y-16">
      </div>

    <div id="scroll-anchor" class="h-40 flex items-center justify-center">
      <div id="loader" class="hidden animate-spin rounded-full h-6 w-6 border-2 border-gray-200"></div>
    </div>
  </main>

  <script>
    const API_BASE = "https://aliexpress-proxy.miralbenizi7.workers.dev";
    let currentPage = 1;
    let currentQuery = "minimalist aesthetic";
    let isLoading = false;
    let wishlist = JSON.parse(localStorage.getItem('wishlist')) || [];

    async function router() {
      const params = new URLSearchParams(window.location.search);
      const s = params.get('s');
      const cat = params.get('cat');
      
      currentPage = 1;
      currentQuery = s || cat || "minimalist aesthetic";
      document.getElementById('main-title').innerText = s ? `Results: ${s}` : (cat ? cat : "Selected Essentials");
      document.getElementById('product-grid').innerHTML = "";
      updateWishCount();
      await loadMore();
    }

    async function loadMore() {
      if (isLoading) return;
      isLoading = true;
      document.getElementById('loader').classList.remove('hidden');

      try {
        const res = await fetch(`${API_BASE}/?q=${encodeURIComponent(currentQuery)}&page=${currentPage}`);
        const data = await res.json();
        if (data.products) {
          renderProducts(data.products);
          currentPage++;
        }
      } finally {
        isLoading = false;
        document.getElementById('loader').classList.add('hidden');
      }
    }

    function renderProducts(products) {
      const grid = document.getElementById('product-grid');
      products.forEach(p => {
        const isSaved = wishlist.find(item => item.id === p.id);
        const div = document.createElement('div');
        div.className = "product-card group";
        div.innerHTML = `
          <button onclick="toggleWishlist('${p.id}', '${p.title}', '${p.image}', '${p.link}', '${p.price}')" 
                  class="save-btn bg-white p-2 rounded-full shadow-sm hover:scale-110 transition">
            <svg class="w-5 h-5 ${isSaved ? 'fill-black' : 'fill-none'} stroke-black" viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l8.84-8.84 1.06-1.06a5.5 5.5 0 000-7.78z"></path></svg>
          </button>
          <a href="${p.link}" target="_blank">
            <div class="aspect-[4/5] bg-gray-50 overflow-hidden mb-4">
              <img src="${p.image}" class="w-full h-full object-cover mix-blend-multiply" loading="lazy">
            </div>
            <h3 class="text-sm font-medium text-gray-900 mb-1 truncate">${p.title}</h3>
            <p class="text-sm text-gray-400">$${p.price}</p>
          </a>
        `;
        grid.appendChild(div);
      });
    }

    // --- Wishlist Logic (No Database) ---
    function toggleWishlist(id, title, image, link, price) {
      const idx = wishlist.findIndex(item => item.id === id);
      if (idx > -1) wishlist.splice(idx, 1);
      else wishlist.push({id, title, image, link, price});
      
      localStorage.setItem('wishlist', JSON.stringify(wishlist));
      updateWishCount();
      event.preventDefault(); // Stop click-through
    }

    function updateWishCount() {
      document.getElementById('wish-count').innerText = wishlist.length;
    }

    function showWishlist() {
        document.getElementById('main-title').innerText = "Saved Items";
        document.getElementById('product-grid').innerHTML = "";
        renderProducts(wishlist);
        window.history.pushState({}, '', '/?view=saved');
    }

    // Intersection Observer
    const observer = new IntersectionObserver(e => { if(e[0].isIntersecting) loadMore(); });
    observer.observe(document.getElementById('scroll-anchor'));

    function navigate(url) { window.history.pushState({}, '', url); router(); window.scrollTo(0,0); }
    window.onpopstate = router;
    window.onload = router;
  </script>
</body>
</html>
