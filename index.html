<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BuyCenter | Smart AliExpress Shopping</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <style>
    body { background: #0f172a; color: #f8fafc; font-family: 'Inter', sans-serif; }
    .nav-link { @apply hover:text-blue-400 transition; cursor: pointer; }
    .product-card { background: #1e293b; transition: transform 0.2s; }
    .product-card:hover { transform: translateY(-5px); }
    .section-title { font-size: 1.5rem; font-weight: bold; border-left: 4px solid #3b82f6; padding-left: 12px; margin-bottom: 20px; }
    #page-content { min-height: 70vh; }
  </style>
</head>
<body class="pt-20">

  <header class="fixed top-0 w-full bg-gray-900 border-b border-gray-800 z-50 p-4">
    <div class="max-w-7xl mx-auto flex flex-wrap items-center justify-between gap-4">
      <h1 class="text-2xl font-black text-blue-500 cursor-pointer" onclick="navigate('/')">BuyCenter</h1>
      
      <div class="flex-1 max-w-md relative">
        <input type="text" id="search-input" placeholder="Search gadgets, home, fashion..." 
               class="w-full bg-gray-800 border border-gray-700 rounded-full py-2 px-5 focus:outline-none focus:ring-2 focus:ring-blue-500">
        <button onclick="handleSearch()" class="absolute right-3 top-2 text-gray-400">🔍</button>
      </div>

      <nav class="space-x-6 hidden md:flex">
        <span class="nav-link" onclick="navigate('/')">Home</span>
        <span class="nav-link" onclick="navigate('/?cat=electronics')">Electronics</span>
        <span class="nav-link" onclick="navigate('/?cat=home+gadgets')">Home</span>
        <span class="nav-link" onclick="navigate('/?cat=deals')">Flash Deals</span>
      </nav>
    </div>
  </header>

  <main id="page-content" class="max-w-7xl mx-auto p-4"></main>

  <footer class="bg-gray-900 text-center p-10 mt-20 border-t border-gray-800 text-sm text-gray-500">
    <p>© 2026 BuyCenter.co.uk — Affiliate Disclosure: We earn from qualifying purchases.</p>
  </footer>

  <script>
    const API_BASE = "https://aliexpress-proxy.miralbenizi7.workers.dev";

    // --- 1. ROUTER SYSTEM ---
    async function router() {
      const params = new URLSearchParams(window.location.search);
      const cat = params.get('cat');
      const search = params.get('s');
      const productId = params.get('id');
      const content = document.getElementById('page-content');
      
      content.innerHTML = `<div class="text-center py-20 text-blue-400 animate-pulse text-xl">Loading BuyCenter Deals...</div>`;

      if (productId) {
        renderProductPage(productId);
      } else if (search || cat) {
        renderGalleryPage(search || cat);
      } else {
        renderHomePage();
      }
    }

    function navigate(url) {
      window.history.pushState({}, '', url);
      router();
    }

    // --- 2. PAGE RENDERERS ---

    async function renderHomePage() {
      const content = document.getElementById('page-content');
      content.innerHTML = `
        <section class="mb-12 text-center py-10 bg-blue-900 rounded-3xl">
          <h2 class="text-4xl font-bold mb-2">The Best of AliExpress, Simplified.</h2>
          <p class="text-blue-200">Hand-picked trending items and exclusive UK discounts.</p>
        </section>
        <h2 class="section-title">🔥 Trending Now</h2>
        <div id="home-grid" class="grid grid-cols-2 md:grid-cols-4 gap-6"></div>
      `;
      const products = await fetchProducts("trending");
      displayProducts(products, "home-grid");
    }

    async function renderGalleryPage(query) {
      const content = document.getElementById('page-content');
      content.innerHTML = `
        <h2 class="section-title text-capitalize">Results for: ${query}</h2>
        <div id="gallery-grid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-6"></div>
      `;
      const products = await fetchProducts(query, 20);
      displayProducts(products, "gallery-grid");
    }

    async function renderProductPage(id) {
        // Here you'd fetch specific ID data. For a static affiliate site, 
        // usually we redirect directly to Ali, but we can build a "Bridge Page" here.
        const content = document.getElementById('page-content');
        content.innerHTML = `
            <div class="grid md:grid-cols-2 gap-10 p-10 bg-gray-800 rounded-3xl">
                <div class="bg-gray-700 h-96 rounded-xl animate-pulse"></div>
                <div class="space-y-6">
                    <h1 class="text-3xl font-bold">Loading Product Details...</h1>
                    <p class="text-yellow-400 text-2xl font-bold italic">Fetching best price...</p>
                    <button class="w-full bg-blue-600 py-4 rounded-xl font-bold">Redirecting to AliExpress...</button>
                </div>
            </div>`;
        // In a simple affiliate site, usually clicking the grid goes straight to Ali.
        // If you want a real detail page, you need an API that supports GetProductById.
    }

    // --- 3. UTILITIES ---

    async function fetchProducts(keyword, limit = 12) {
      try {
        const res = await fetch(`${API_BASE}/?q=${encodeURIComponent(keyword)}&page=1`);
        const data = await res.json();
        return data.products ? data.products.slice(0, limit) : [];
      } catch (e) { return []; }
    }

    function displayProducts(products, containerId) {
      const grid = document.getElementById(containerId);
      grid.innerHTML = products.map(p => `
        <div class="product-card rounded-xl overflow-hidden p-3 shadow-lg flex flex-col">
          <img src="${p.image}" class="w-full h-48 object-cover rounded-lg mb-3">
          <h3 class="text-sm font-medium line-clamp-2 h-10 mb-2">${p.title}</h3>
          <div class="mt-auto flex justify-between items-center">
            <span class="text-yellow-400 font-bold">$${p.price}</span>
            <a href="${p.link}" target="_blank" class="bg-blue-600 text-xs px-3 py-1 rounded-full font-bold hover:bg-blue-500">BUY</a>
          </div>
        </div>
      `).join('');
    }

    function handleSearch() {
      const query = document.getElementById('search-input').value;
      if (query) navigate(`/?s=${encodeURIComponent(query)}`);
    }

    // Listen for Enter key on search
    document.getElementById('search-input')?.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') handleSearch();
    });

    window.onpopstate = router;
    window.onload = router;
  </script>
</body>
</html>
