<script src="products.js"></script>

<script>
    // These functions now use the data from products.js
    function renderGrid(products) {
      const grid = document.getElementById('product-grid');
      grid.innerHTML = ""; // Clear current view
      
      products.forEach(p => {
        const div = document.createElement('div');
        div.className = "product-card p-6 rounded-3xl";
        div.onclick = () => openModal(p.id);
        div.innerHTML = `
          <div class="aspect-square mb-6 overflow-hidden rounded-2xl bg-gray-100">
            <img src="${p.images[0]}" class="w-full h-full object-cover hover:scale-105 transition duration-500">
          </div>
          <div class="space-y-2">
            <span class="text-[10px] font-bold text-blue-500 uppercase tracking-widest">${p.category}</span>
            <h3 class="text-lg font-bold truncate">${p.title}</h3>
            <p class="text-xl font-light">$${p.price}</p>
          </div>
        `;
        grid.appendChild(div);
      });
      document.getElementById('item-count').innerText = `${products.length} Curated Tools`;
    }

    function openModal(id) {
      const p = allProducts.find(item => item.id === id);
      if(!p) return;

      document.getElementById('modal-title').innerText = p.title;
      document.getElementById('modal-price').innerText = `$${p.price}`;
      document.getElementById('modal-desc').innerText = p.description;
      document.getElementById('modal-cat').innerText = p.category;
      document.getElementById('modal-link').href = p.buyLink;
      
      const mainImg = document.getElementById('modal-main-img');
      mainImg.src = p.images[0];

      // Generate Thumbnails for multiple pictures
      const thumbs = document.getElementById('modal-thumbnails');
      thumbs.innerHTML = p.images.map((img, i) => `
        <img src="${img}" class="thumbnail ${i===0?'active':''}" onclick="updateMainImg(this, '${img}')">
      `).join('');

      document.getElementById('modal').style.display = 'block';
      document.body.style.overflow = 'hidden'; // Stop background scrolling
    }

    function updateMainImg(el, src) {
      document.getElementById('modal-main-img').src = src;
      document.querySelectorAll('.thumbnail').forEach(t => t.classList.remove('active'));
      el.classList.add('active');
    }

    function closeModal() {
      document.getElementById('modal').style.display = 'none';
      document.body.style.overflow = 'auto';
    }

    function filterCategory(cat) {
      const filtered = allProducts.filter(p => p.category === cat);
      renderGrid(filtered);
      document.getElementById('main-title').innerText = cat;
    }

    // Initialize the store
    window.onload = () => {
      if (typeof allProducts !== 'undefined') {
        renderGrid(allProducts);
      } else {
        console.error("products.js not found!");
      }
    };
</script>
