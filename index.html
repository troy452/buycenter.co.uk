<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  
  <title>BuyCenter Kids | Premium Montessori & STEM Learning Toys</title>
  <meta name="description" content="Shop curated Montessori toys and STEM kits. Our educational toys are hand-picked for quality and developmental value. Helping children learn through play.">
  
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
  
  <style>
    :root { --primary: #FF6B6B; --secondary: #4ECDC4; --bg: #F7F9FC; --text: #2D3436; }
    body { background: var(--bg); color: var(--text); font-family: 'Quicksand', sans-serif; }
    
    .product-card { background: white; border-radius: 2rem; transition: 0.3s; border: 2px solid transparent; cursor: pointer; }
    .product-card:hover { transform: translateY(-5px); border-color: var(--secondary); shadow: 0 15px 30px rgba(0,0,0,0.05); }
    
    header { background: rgba(255,255,255,0.95); backdrop-filter: blur(10px); border-bottom: 2px solid #edf2f7; }
    
    #modal { display: none; position: fixed; inset: 0; background: white; z-index: 1000; overflow-y: auto; }
    .btn-buy { background: var(--primary); color: white; border-radius: 1rem; padding: 1rem; font-weight: 700; display: block; text-align: center; }
    
    .thumb { width: 60px; height: 60px; border-radius: 10px; cursor: pointer; border: 2px solid #eee; }
    .thumb.active { border-color: var(--secondary); }
    
    /* Loading Spinner */
    .loader { border: 4px solid #f3f3f3; border-top: 4px solid var(--secondary); border-radius: 50%; width: 40px; height: 40px; animate: spin 1s linear infinite; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body class="pt-24">

  <header class="fixed top-0 w-full z-50">
    <div class="max-w-[1200px] mx-auto px-6 py-4 flex items-center justify-between">
      <div class="flex items-center space-x-2 cursor-pointer" onclick="window.location.reload()">
        <span class="text-2xl">🚀</span>
        <h1 class="text-xl font-bold tracking-tighter">BUYCENTER <span class="text-red-500">KIDS</span></h1>
      </div>
      <nav class="hidden md:flex space-x-6 text-sm font-bold uppercase tracking-widest">
        <span class="cursor-pointer hover:text-blue-500" onclick="filterCat('All')">Shop All</span>
        <span class="cursor-pointer hover:text-blue-500" onclick="filterCat('Montessori')">Montessori</span>
        <span class="cursor-pointer hover:text-blue-500" onclick="filterCat('STEM')">STEM</span>
      </nav>
      <input type="text" id="search" placeholder="Search toys..." class="bg-gray-100 rounded-full px-4 py-2 text-sm outline-none focus:ring-2 focus:ring-blue-200">
    </div>
  </header>

  <main class="max-w-[1200px] mx-auto px-6 py-10">
    <h2 id="title" class="text-5xl font-bold mb-2">The Playroom</h2>
    <p id="count" class="text-gray-400 font-bold text-xs uppercase tracking-widest mb-10 text-secondary">Checking the shelves...</p>

    <div id="grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8">
      <div id="main-loader" class="col-span-full flex flex-col items-center py-20">
        <div class="loader mb-4"></div>
        <p>Loading your toys...</p>
      </div>
    </div>
  </main>

  <div id="modal">
    <div class="max-w-[1000px] mx-auto px-6 py-20 relative">
      <button onclick="closeModal()" class="absolute top-10 right-10 text-4xl">&times;</button>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-12">
        <div>
          <img id="m-img" src="" class="w-full aspect-square object-contain bg-gray-50 rounded-3xl p-6 mb-4">
          <div id="m-thumbs" class="flex flex-wrap gap-2 justify-center"></div>
        </div>
        <div class="flex flex-col justify-center">
          <span id="m-cat" class="text-blue-500 font-bold uppercase text-xs mb-2"></span>
          <h2 id="m-title" class="text-3xl font-bold mb-4"></h2>
          <p id="m-price" class="text-2xl text-red-500 font-bold mb-6"></p>
          <p id="m-desc" class="text-gray-600 leading-relaxed mb-8 bg-blue-50 p-4 rounded-2xl"></p>
          <a id="m-link" href="#" target="_blank" class="btn-buy shadow-lg">View on AliExpress</a>
        </div>
      </div>
    </div>
  </div>

  <script src="./products.js"></script>

  <script>
    // 1. BULLETPROOF LOADER: Wait for the file to be ready
    window.addEventListener('load', () => {
      setTimeout(() => {
        if (typeof allProducts !== 'undefined') {
          render(allProducts);
        } else {
          document.getElementById('grid').innerHTML = `
            <div class="col-span-full text-center py-20">
              <p class="text-red-500 font-bold">Error: products.js not found.</p>
              <p class="text-sm text-gray-500 mt-2">Make sure products.js is in the same folder as index.html and starts with: <br> <code>const allProducts = [...];</code></p>
            </div>`;
        }
      }, 500); // Small delay to ensure file registration
    });

    function render(data) {
      const grid = document.getElementById('grid');
      grid.innerHTML = "";
      data.forEach(p => {
        const div = document.createElement('div');
        div.className = "product-card p-4 shadow-sm";
        div.onclick = () => openModal(p.id);
        div.innerHTML = `
          <div class="aspect-square mb-4 rounded-2xl overflow-hidden bg-white">
            <img src="${p.images[0]}" class="w-full h-full object-contain p-2">
          </div>
          <p class="text-[10px] font-bold text-blue-400 uppercase">${p.category}</p>
          <h3 class="font-bold text-sm line-clamp-2 h-10 mb-2">${p.title}</h3>
          <p class="text-lg font-bold text-red-500">$${p.price}</p>
        `;
        grid.appendChild(div);
      });
      document.getElementById('count').innerText = `${data.length} Toys Available`;
      document.getElementById('main-loader').style.display = 'none';
    }

    function openModal(id) {
      const p = allProducts.find(x => x.id === id);
      document.getElementById('m-title').innerText = p.title;
      document.getElementById('m-price').innerText = `$${p.price}`;
      document.getElementById('m-desc').innerText = p.description;
      document.getElementById('m-cat').innerText = p.category;
      document.getElementById('m-link').href = p.buyLink;
      document.getElementById('m-img').src = p.images[0];
      
      const thumbs = document.getElementById('m-thumbs');
      thumbs.innerHTML = p.images.map((img, i) => `
        <img src="${img}" class="thumb ${i===0?'active':''}" onclick="setMainImg(this, '${img}')">
      `).join('');

      document.getElementById('modal').style.display = 'block';
      document.body.style.overflow = 'hidden';
    }

    function setMainImg(el, src) {
      document.getElementById('m-img').src = src;
      document.querySelectorAll('.thumb').forEach(t => t.classList.remove('active'));
      el.classList.add('active');
    }

    function closeModal() {
      document.getElementById('modal').style.display = 'none';
      document.body.style.overflow = 'auto';
    }

    function filterCat(cat) {
      const filtered = cat === 'All' ? allProducts : allProducts.filter(x => x.category === cat);
      render(filtered);
      document.getElementById('title').innerText = cat === 'All' ? "The Playroom" : cat;
    }

    document.getElementById('search').addEventListener('input', (e) => {
      const q = e.target.value.toLowerCase();
      const s = allProducts.filter(x => x.title.toLowerCase().includes(q) || x.category.toLowerCase().includes(q));
      render(s);
    });
  </script>
</body>
</html>
