<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  
  <title>BuyCenter Kids | Montessori & Educational Toys for Early Development</title>
  <meta name="description" content="Expert-curated Montessori toys, STEM kits, and educational guides for parents. Help your child develop fine motor skills through purposeful play.">
  
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
  
  <style>
    :root { --primary: #FF6B6B; --secondary: #4ECDC4; --bg: #F8FAFC; --text: #1E293B; }
    body { background: var(--bg); color: var(--text); font-family: 'Quicksand', sans-serif; -webkit-font-smoothing: antialiased; }
    
    .toy-card { background: white; border-radius: 2.5rem; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); border: 2px solid #f1f5f9; cursor: pointer; position: relative; }
    .toy-card:hover { transform: translateY(-10px); border-color: var(--secondary); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.08); }
    
    header { background: rgba(255,255,255,0.85); backdrop-filter: blur(20px); border-bottom: 2px solid #f1f5f9; }
    
    /* Article Cards */
    .art-card { background: white; border-radius: 2rem; padding: 2rem; border: 2px solid transparent; transition: 0.3s; cursor: pointer; }
    .art-card:hover { border-color: var(--primary); background: #FFF9F9; }

    #modal, #art-modal { display: none; position: fixed; inset: 0; background: white; z-index: 1000; overflow-y: auto; }
    .btn-action { background: var(--text); color: white; border-radius: 1.25rem; padding: 1.25rem; font-weight: 700; text-align: center; width: 100%; display: block; transition: 0.3s; }
    .btn-action:hover { background: var(--primary); transform: scale(1.02); }
    
    .thumb { width: 70px; height: 70px; border-radius: 15px; cursor: pointer; border: 3px solid #f1f5f9; object-fit: cover; }
    .thumb.active { border-color: var(--secondary); }

    .age-badge { position: absolute; top: 1.5rem; left: 1.5rem; z-index: 10; background: white; padding: 4px 12px; border-radius: 99px; font-size: 10px; font-weight: 800; border: 1px solid #eee; }
    
    /* 2752x1536 Banner Logic */
    .aspect-banner { position: relative; width: 100%; padding-top: 55.81%; }
    .aspect-banner img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
  </style>
</head>
<body class="pt-20">

  <header class="fixed top-0 w-full z-50">
    <div class="max-w-[1280px] mx-auto px-6 py-4 flex items-center justify-between">
      <div class="flex items-center space-x-2 cursor-pointer" onclick="window.location.href='/'">
        <span class="text-3xl">🧸</span>
        <h1 class="text-xl font-bold tracking-tighter uppercase">BUYCENTER <span class="text-red-500">KIDS</span></h1>
      </div>
      <nav class="hidden md:flex space-x-8 text-xs font-bold uppercase tracking-widest">
        <span class="cursor-pointer hover:text-red-500" onclick="filterCat('All')">Shop All</span>
        <span class="cursor-pointer hover:text-red-500" onclick="filterCat('Montessori')">Montessori</span>
      </nav>
      <input type="text" id="search" placeholder="Search toys..." class="bg-gray-100 rounded-full px-6 py-2 text-sm outline-none focus:ring-2 focus:ring-blue-200">
    </div>
  </header>

  <div class="w-full aspect-banner">
    <img src="./banner.jpg" alt="BuyCenter Kids Montessori Banner">
  </div>

  <main class="max-w-[1280px] mx-auto px-6 py-16">
    <div class="mb-12">
      <h2 id="view-title" class="text-5xl font-bold tracking-tight">The Playroom</h2>
      <p id="item-count" class="text-secondary font-bold text-xs uppercase tracking-widest mt-2">Loading toys...</p>
    </div>
    <div id="product-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-10 mb-24"></div>

    <div class="border-t border-gray-100 pt-16">
      <h2 class="text-4xl font-bold mb-10 tracking-tight">Parenting Insights</h2>
      <div id="article-grid" class="grid grid-cols-1 md:grid-cols-2 gap-8"></div>
    </div>
  </main>

  <div id="modal">
    <div class="max-w-[1100px] mx-auto px-6 py-16 relative">
      <button onclick="closeModal()" class="fixed top-8 right-8 text-5xl text-gray-300 hover:text-black">&times;</button>
      <div class="grid grid-cols-1 lg:grid-cols-2 gap-16 mt-10">
        <div>
          <div class="aspect-square bg-gray-50 rounded-[3rem] overflow-hidden p-8 mb-6"><img id="modal-img" src="" class="w-full h-full object-contain"></div>
          <div id="modal-thumbs" class="flex flex-wrap gap-3 justify-center"></div>
        </div>
        <div class="flex flex-col justify-center">
          <span id="modal-cat" class="text-secondary font-black uppercase text-[10px] tracking-widest mb-2"></span>
          <h2 id="modal-title" class="text-4xl font-bold mb-4 leading-tight"></h2>
          <div class="text-3xl font-bold text-red-500 mb-6" id="modal-price"></div>
          <p id="modal-desc" class="bg-blue-50 p-8 rounded-[2.5rem] mb-8 text-blue-900"></p>
          <a id="modal-link" href="#" target="_blank" class="btn-action">VIEW ON STORE</a>
        </div>
      </div>
    </div>
  </div>

  <div id="art-modal" class="p-6">
    <div class="max-w-3xl mx-auto py-20 relative">
      <button onclick="closeArt()" class="fixed top-8 right-8 text-4xl text-gray-300">&times;</button>
      <img id="art-img" src="" class="w-full h-80 object-cover rounded-[2.5rem] mb-10 shadow-lg">
      <h2 id="art-title" class="text-5xl font-bold mb-8"></h2>
      <div id="art-content" class="text-lg text-gray-700 leading-relaxed space-y-6"></div>
    </div>
  </div>

  <script>
    // Load products.js with cache busting
    const script = document.createElement('script');
    script.src = "products.js?v=" + new Date().getTime();
    document.head.appendChild(script);

    script.onload = () => {
      if (typeof allProducts !== 'undefined') {
        renderGrid(allProducts);
        renderArticles();
      }
    };

    function renderGrid(products) {
      const grid = document.getElementById('product-grid');
      grid.innerHTML = products.map(p => `
        <div class="toy-card p-5" onclick="openModal(${p.id})">
          <div class="age-badge">AGES ${p.age}</div>
          <div class="aspect-square mb-6 rounded-[2rem] overflow-hidden bg-white">
            <img src="./${p.images[0]}" class="w-full h-full object-contain p-4">
          </div>
          <span class="text-[9px] font-black text-secondary uppercase tracking-widest">${p.category}</span>
          <h3 class="font-bold text-sm line-clamp-2 h-10 mt-1 mb-4 leading-snug">${p.title}</h3>
          <div class="flex justify-between items-end">
            <p class="text-2xl font-extrabold text-red-500">$${p.price}</p>
            <span class="bg-gray-100 text-[10px] font-bold py-2 px-4 rounded-full">DETAILS</span>
          </div>
        </div>
      `).join('');
      document.getElementById('item-count').innerText = `${products.length} Educational Tools Found`;
    }

    function renderArticles() {
      const grid = document.getElementById('article-grid');
      grid.innerHTML = educationalArticles.map(a => `
        <div class="art-card shadow-sm" onclick="openArt('${a.id}')">
          <h3 class="text-2xl font-bold mb-4">${a.title}</h3>
          <p class="text-gray-500 mb-6">${a.excerpt}</p>
          <span class="text-red-500 font-bold text-xs uppercase tracking-widest">Read Guide →</span>
        </div>
      `).join('');
    }

    function openModal(id) {
      const p = allProducts.find(x => x.id === id);
      document.getElementById('modal-title').innerText = p.title;
      document.getElementById('modal-price').innerText = `$${p.price}`;
      document.getElementById('modal-desc').innerHTML = `<strong>Best for ${p.age}</strong><br><br>${p.description}`;
      document.getElementById('modal-cat').innerText = p.category;
      document.getElementById('modal-link').href = p.buyLink;
      document.getElementById('modal-img').src = `./${p.images[0]}`;
      document.getElementById('modal-thumbs').innerHTML = p.images.map((img, i) => `<img src="./${img}" class="thumb ${i===0?'active':''}" onclick="setImg(this, './${img}')">`).join('');
      document.getElementById('modal').style.display = 'block';
      document.body.style.overflow = 'hidden';
    }

    function openArt(id) {
      const a = educationalArticles.find(x => x.id === id);
      document.getElementById('art-title').innerText = a.title;
      document.getElementById('art-content').innerText = a.content;
      document.getElementById('art-img').src = `./${a.image}`;
      document.getElementById('art-modal').style.display = 'block';
      document.body.style.overflow = 'hidden';
    }

    function setImg(el, src) { document.getElementById('modal-img').src = src; document.querySelectorAll('.thumb').forEach(t => t.classList.remove('active')); el.classList.add('active'); }
    function closeModal() { document.getElementById('modal').style.display = 'none'; document.body.style.overflow = 'auto'; }
    function closeArt() { document.getElementById('art-modal').style.display = 'none'; document.body.style.overflow = 'auto'; }
    function filterCat(cat) { const filtered = cat === 'All' ? allProducts : allProducts.filter(x => x.category === cat); renderGrid(filtered); document.getElementById('view-title').innerText = cat; }

    document.getElementById('search').addEventListener('input', (e) => {
      const q = e.target.value.toLowerCase();
      const s = allProducts.filter(x => x.title.toLowerCase().includes(q) || x.category.toLowerCase().includes(q));
      renderGrid(s);
    });
  </script>
</body>
</html>
