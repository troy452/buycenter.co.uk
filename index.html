<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BuyCenter | Pro AliExpress Affiliate</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <style>
    body { background: #0b0f1a; color: #e2e8f0; font-family: 'Inter', sans-serif; }
    .sidebar-item { @apply flex items-center p-3 rounded-lg hover:bg-gray-800 cursor-pointer transition text-gray-400 hover:text-white; }
    .product-card { background: #161e2d; border: 1px solid #1e293b; transition: all 0.3s ease; }
    .product-card:hover { border-color: #3b82f6; transform: translateY(-4px); }
    .loading-skeleton { background: linear-gradient(90deg, #1e293b 25%, #2d3748 50%, #1e293b 75%); background-size: 200% 100%; animation: skeleton-loading 1.5s infinite; }
    @keyframes skeleton-loading { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
  </style>
</head>
<body class="pt-16">

  <header class="fixed top-0 w-full bg-[#0b0f1a]/80 backdrop-blur-md border-b border-gray-800 z-50">
    <div class="max-w-[1600px] mx-auto flex items-center justify-between p-4 gap-4">
      <h1 class="text-2xl font-black text-blue-500 cursor-pointer tracking-tighter" onclick="navigate('/')">BUYCENTER</h1>
      <div class="flex-1 max-w-2xl relative">
        <input type="text" id="search-input" placeholder="Search 100 million+ products..." 
               class="w-full bg-gray-900 border border-gray-700 rounded-xl py-2.5 px-5 focus:ring-2 focus:ring-blue-500 outline-none">
        <button onclick="handleSearch()" class="absolute right-4 top-3 text-gray-500">🔍</button>
      </div>
    </div>
  </header>

  <div class="max-w-[1600px] mx-auto flex">
    
    <aside class="w-64 hidden lg:block p-4 sticky top-16 h-[calc(100vh-64px)] overflow-y-auto border-r border-gray-800">
      <h3 class="text-xs font-semibold text-gray-500 uppercase tracking-widest mb-4 px-3">Categories</h3>
      <nav class="space-y-1">
        <div class="sidebar-item" onclick="navigate('/?cat=electronics')">🔌 Electronics</div>
        <div class="sidebar-item" onclick="navigate('/?cat=computer+office')">💻 Computer & Office</div>
        <div class="sidebar-item" onclick="navigate('/?cat=home+appliances')">🏠 Home & Garden</div>
        <div class="sidebar-item" onclick="navigate('/?cat=fashion')">👕 Fashion & Clothing</div>
        <div class="sidebar-item" onclick="navigate('/?cat=toys+kids')">🧸 Toys & Kids</div>
        <div class="sidebar-item" onclick="navigate('/?cat=automobiles')">🚗 Automobiles</div>
        <div class="sidebar-item" onclick="navigate('/?cat=beauty')">💄 Health & Beauty</div>
        <div class="sidebar-item" onclick="navigate('/?cat=sports')">⚽ Sports & Outdoors</div>
      </nav>
    </aside>

    <main class="flex-1 p-6">
      <div id="page-header" class="mb-8">
        <h2 id="main-title" class="text-3xl font-bold">Recommended For You</h2>
      </div>

      <div id="product-grid" class="grid grid-cols-2 md:grid-cols-3 xl:grid-cols-4 2xl:grid-cols-5 gap-4">
        </div>

      <div id="scroll-anchor" class="h-20 flex items-center justify-center mt-10">
        <div id="loader" class="hidden animate-spin rounded-full h-8 w-8 border-b-2 border-blue-500"></div>
      </div>
    </main>
  </div>

  <script>
    const API_BASE = "https://aliexpress-proxy.miralbenizi7.workers.dev";
    let currentPage = 1;
    let currentQuery = "trending";
    let isLoading = false;
    let hasMore = true;

    // --- 1. CORE ENGINE ---
    async function router() {
      const params = new URLSearchParams(window.location.search);
      const cat = params.get('cat');
      const s = params.get('s');
      
      // Reset state for new view
      currentPage = 1;
      hasMore = true;
      currentQuery = s || cat || "trending";
      
      document.getElementById('main-title').innerText = s ? `Results for "${s}"` : (cat ? cat.toUpperCase() : "Recommended For You");
      document.getElementById('product-grid').innerHTML = ""; // Clear existing
      
      await loadMoreProducts();
    }

    async function loadMoreProducts() {
      if (isLoading || !hasMore) return;
      isLoading = true;
      document.getElementById('loader').classList.remove('hidden');

      try {
        const res = await fetch(`${API_BASE}/?q=${encodeURIComponent(currentQuery)}&page=${currentPage}`);
        const data = await res.json();
        
        if (data.products && data.products.length > 0) {
          renderProducts(data.products);
          currentPage++;
        } else {
          hasMore = false;
        }
      } catch (err) {
        console.error("Fetch error:", err);
      } finally {
        isLoading = false;
        document.getElementById('loader').classList.add('hidden');
      }
    }

    function renderProducts(products) {
      const grid = document.getElementById('product-grid');
      products.forEach(p => {
        const div = document.createElement('div');
        div.className = "product-card rounded-xl overflow-hidden flex flex-col";
        div.innerHTML = `
          <a href="${p.link}" target="_blank" class="flex-1">
            <div class="aspect-square bg-gray-800 overflow-hidden">
                <img src="${p.image}" class="w-full h-full object-cover" loading="lazy">
            </div>
            <div class="p-3">
              <h3 class="text-xs text-gray-300 line-clamp-2 mb-2 leading-relaxed h-8">${p.title}</h3>
              <div class="flex items-baseline gap-2">
                <span class="text-xl font-black text-white">$${p.price}</span>
                <span class="text-[10px] text-blue-400 bg-blue-400/10 px-1.5 rounded uppercase font-bold">Free Shipping</span>
              </div>
            </div>
          </a>
        `;
        grid.appendChild(div);
      });
    }

    // --- 2. INFINITE SCROLL OBSERVER ---
    const observer = new IntersectionObserver((entries) => {
      if (entries[0].isIntersecting && !isLoading) {
        loadMoreProducts();
      }
    }, { threshold: 0.1 });

    observer.observe(document.getElementById('scroll-anchor'));

    // --- 3. NAVIGATION ---
    function navigate(url) {
      window.history.pushState({}, '', url);
      router();
      window.scrollTo(0, 0);
    }

    function handleSearch() {
      const q = document.getElementById('search-input').value;
      if (q) navigate(`/?s=${encodeURIComponent(q)}`);
    }

    document.getElementById('search-input').onkeypress = (e) => { if(e.key === 'Enter') handleSearch(); };
    window.onpopstate = router;
    window.onload = router;
  </script>
</body>
</html>
